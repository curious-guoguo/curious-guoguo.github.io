<script>
// 复制链接函数
function copyLink(text){
    navigator.clipboard.writeText(text).then(()=>{
        alert("已复制链接：" + text);
    }).catch(()=>{
        // 兼容旧浏览器
        let input = document.createElement('input');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert("已复制链接：" + text);
    });
}
</script>
